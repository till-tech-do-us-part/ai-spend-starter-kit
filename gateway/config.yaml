# Engineers and apps ask for a job tier, not a vendor model.
# Model names verified July 2026 — check https://docs.litellm.ai/docs/providers for today's names.
model_list:
  # Lever: cheaper defaults. Use this for routine coding and chat work.
  - model_name: default
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # Internal resilience plumbing, not a fourth job tier.
  - model_name: default-fallback
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # Lever: routing. Choose this tier for architecture and hard debugging.
  - model_name: planning
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # Independent-check tier, active by default on the good Gemini model with no separate key.
  - model_name: review
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # Optional — add a second provider for cross-provider model-diversity review.
  # Armstrong: "models check each other's work."
  # Costs extra, needs that provider's own key, and requires your own budget approval.
  # Gemini is the default provider; do not make a second provider your default.
  # Replace the active review entry above with one example, ordered cheapest-first.
  # - model_name: review
  #   litellm_params:
  #     model: groq/openai/gpt-oss-120b
  #     api_key: os.environ/GROQ_API_KEY
  # - model_name: review
  #   litellm_params:
  #     model: openai/gpt-5.4-mini
  #     api_key: os.environ/OPENAI_API_KEY
  # Anthropic is typically the most expensive — listed last for that reason.
  # - model_name: review
  #   litellm_params:
  #     model: anthropic/claude-haiku-4-5-20251001
  #     api_key: os.environ/ANTHROPIC_API_KEY

router_settings:
  # Lever: routing. Provider errors fall back; job choice still belongs to the caller.
  fallbacks:
    - default:
        - default-fallback
  num_retries: 2
  timeout: 120

litellm_settings:
  # Lever: caching. Exact repeats come from local Redis for one hour.
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 3600
  # Keep one OpenAI-compatible endpoint usable across providers.
  drop_params: true

general_settings:
  # Lever: visibility. Virtual keys and spend history require the master key and database.
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
